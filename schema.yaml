# 这里的属性定义了在安装过程中收集的基础数据
properties:
  # 应用实例的显示名称
  name:
    type: string
  # 用户在界面上选择的目标命名空间
  namespace:
    type: string

# 这里的配置决定了 GCP 控制台的 UI 展示以及参数如何传递给 Helm
x-google-marketplace:
  schemaVersion: v2
  applicationMetadata:
    title: "Alluxio Operator"
    version: "1.0.0" # 请根据你的实际版本修改

  # 定义 UI 上的输入控件
  widgets:
    - name: name
      type: APPLICATION_NAME
      label: "实例名称"
    - name: namespace
      type: NAMESPACE_SELECTION
      label: "命名空间"

  # 关键步骤：将 UI 变量映射到 Helm 的 values.yaml
  provisioning:
    standard:
      values:
        # 即使你不让用户填，GCP 也需要将这几个基础参数传给 Helm
        # 对应你 values.yaml 里的空位或默认逻辑
        nameOverride: "{name}"
        fullnameOverride: "{name}"
        namespace: "{namespace}"
